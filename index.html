<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPERHOUSE INC Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10555663" data-sdk="show_10555663"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .progress-bar { transition: width 1s linear; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <!-- Login Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8">
        <div class="bg-green-50 p-6 rounded-full mb-6">
            <span class="text-6xl">🌸</span>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Welcome Back</h1>
        <p class="text-slate-400 mb-8 text-center text-sm">Grow your virtual garden and earn daily.</p>
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 ring-green-500 transition-all">
            <input type="text" id="ref-input" placeholder="Referral Code (Optional)" class="w-full bg-slate-100 p-4 rounded-2xl outline-none">
            <button onclick="login()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-green-200 active:scale-95 transition-transform">Get Started</button>
        </div>
    </div>

    <!-- Top Stats -->
    <header class="bg-green-600 text-white pt-8 pb-16 px-6 rounded-b-[3rem] shadow-lg relative">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div>                    <p class="text-xs font-medium opacity-80 uppercase tracking-widest">Available Balance</p>
                    <h1 class="text-4xl font-black">₱<span id="balance">0.00</span></h1>
                </div>
                <button onclick="showAdminPrompt()" class="bg-white/20 p-2 rounded-xl text-xs backdrop-blur-md">Admin</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                    <p class="text-[10px] opacity-70">Global Farmers</p>
                    <p id="total-users" class="text-lg font-bold">0</p>
                </div>
                <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                    <p class="text-[10px] opacity-70">My Unique ID</p>
                    <p id="display-uid" class="text-sm font-mono font-bold uppercase truncate">---</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-8 relative z-10">
        
        <!-- MINING TAB -->
        <div id="tab-mining" class="tab-content active">
            <!-- Market -->
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                    <span class="text-2xl">🌸</span>
                    <h3 class="font-bold text-slate-700 mt-2">Sampaguita</h3>
                    <p class="text-[10px] text-slate-400 mb-3">Cost: ₱50 | Profit: ₱5</p>
                    <button onclick="buyFlower('sampaguita')" id="btn-buy-sampaguita" class="w-full py-2 bg-green-500 text-white text-xs font-bold rounded-xl shadow-md">BUY (0/10)</button>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                    <span class="text-2xl">🌹</span>
                    <h3 class="font-bold text-slate-700 mt-2">Red Rose</h3>
                    <p class="text-[10px] text-slate-400 mb-3">Cost: ₱100 | Profit: ₱10</p>
                    <button onclick="buyFlower('rose')" id="btn-buy-rose" class="w-full py-2 bg-rose-500 text-white text-xs font-bold rounded-xl shadow-md">BUY (0/10)</button>                </div>
            </div>

            <!-- Garden List -->
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-lg font-black text-slate-800">My Garden</h2>
                <p class="text-[10px] text-orange-500 font-bold bg-orange-50 px-2 py-1 rounded">Crops pause after 4h</p>
            </div>
            <div id="garden-list" class="space-y-4">
                <!-- Mining Items Injected Here -->
            </div>
        </div>

        <!-- WALLET TAB -->
        <div id="tab-wallet" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-sm mb-6">
                <h3 class="font-bold mb-4 text-slate-800">Withdraw Funds</h3>
                <div class="space-y-3 mb-4">
                    <input type="number" id="wit-amount" placeholder="Min. 100 PHP" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                    <input type="text" id="wit-address" placeholder="GCash No. / Wallet Address" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                    <select id="wit-method" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                        <option>GCash</option>
                        <option>PayPal</option>
                        <option>FaucetPay</option>
                    </select>
                </div>
                <button onclick="submitWithdrawal()" class="w-full bg-sllet')" class="flex-1 py-3 flex flex-col items-center">
            <span class="text-xl">💳</span>
            <span class="text-[10px] font-bold">Wallet</span>
        </button>
        <button onclick="switchTab('invite')" class="flex-1 py-3 flex flex-col items-center">
            <span class="text-xl">🎁</span>
            <span class="text-[10px] font-bold">Invite</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
